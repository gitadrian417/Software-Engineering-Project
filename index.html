<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Hello from Electron renderer!</title>
  </head>
  <body>
    <button id="add-new-task">Add New Task</button>
    <form id="task-edit-form" hidden>
      <label for="task-name-edit">Task Name:</label>
      <input type="text" id="task-name-edit" name="task-name-edit"><br><br>
      <label for="task-category-edit">Task Category:</label>
      <input type="text" id="task-category-edit" name="task-category-edit"><br><br>
      <input type="submit" value="Submit">
    </form>
    <div class="my-div-class" id="my-div">
      <h2 id="task-name">Task Name</h2>
      <p id="task-category">Task Category</p>
    </div>
  </body>
  <script src="./renderer.js"></script>
</html>
