<!DOCTYPE html>
<html>
  <link rel="stylesheet" href="style.css">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Assignment Tracker</title>
  </head>
  <body>
    <div class="swap-view" id="swap-view"></div>
      <button id="toggle-Cal">Change to calendar view</button>
      
    <div class="tasks-card-view" id="tasks-card-view">
      <!-- Adding Task -->
      <button id="add-new-task">Add New Task</button>
      <form id="task-create-form" hidden>
        <label for="task-name-edit">Task Name:</label>
        <input type="text" id="task-name-create" name="task-name-create"><br><br>
        <label for="task-class-edit">Task Class:</label>
        <input type="text" id="task-class-create" name="task-class-create"><br><br>
        <label for="task-duedate-edit">Task Due Date:</label>
        <input type="text" id="task-duedate-create" name="task-duedate-create"><br><br>
        <label for="task-priority-create">Task Priority:</label>
        <input type="text" id="task-priority-create" name="task-priority-create"><br><br>
        <input type="submit" value="Submit">
      </form>
      <!-- Editing Task -->
      <form id="task-edit-form" hidden>
        <label for="task-name-edit">Task Name:</label>
        <input type="text" id="task-name-edit" name="task-name-edit"><br><br>
        <label for="task-class-edit">Task Class:</label>
        <input type="text" id="task-class-edit" name="task-class-edit"><br><br>
        <label for="task-duedate-edit">Task Due Date:</label>
        <input type="text" id="task-duedate-edit" name="task-duedate-edit"><br><br>
        <label for="task-priority-edit">Task Priority:</label>
        <input type="text" id="task-priority-edit" name="task-priority-edit"><br><br>
        <input type="submit" value="Submit">
      </form>
    </div>
  </body>
  <script src="./renderer.js"></script>
</html>
