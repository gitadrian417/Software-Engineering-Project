<!DOCTYPE html>
<html>
  <link rel="stylesheet" href="calendar.css">
  <head>
    <title>Calendar View</title>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
  </head>
  <body>
    <div class="calendar">
      <div class="header">
        <button id="prev"><</button>
        <h2 id="h2"></h2>
        <button id="next">></button>
      </div>
      <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>  
        <div>Sat</div>
      </div>
      <div id="dayBox" class="days">
          
      </div>
    </div>
  <p class="p">    
    <button id="toggle-List">Change to List view</button>
  </p>
  </body>
  <script src="./calendar.js"></script>
</html>
